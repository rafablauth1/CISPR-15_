<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Check · Gerenciador de Tarefas</title>
<style>
  :root{
    --navy:#0E2841; --navy-2:#16395A; --gold:#C8A23C; --teal:#1F8A78;
    --bg:#EEF2F6; --card:#FFFFFF; --ink:#0E2841; --muted:#64748B;
    --line:#E2E8F0; --red:#D14343; --amber:#D99A21; --slate:#64748B;
    --shadow:0 1px 2px rgba(14,40,65,.06),0 8px 24px rgba(14,40,65,.08);
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:22px 18px 80px}

  /* HEADER */
  header.top{
    background:linear-gradient(135deg,var(--navy),var(--navy-2));
    color:#fff;border-radius:18px;padding:22px 24px;box-shadow:var(--shadow);
    position:relative;overflow:hidden;
  }
  header.top::after{
    content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;
    border-radius:50%;background:radial-gradient(circle,rgba(200,162,60,.22),transparent 70%);
  }
  .brand{display:flex;align-items:center;gap:13px;margin-bottom:14px}
  .logo{
    width:42px;height:42px;border-radius:11px;background:var(--gold);color:var(--navy);
    display:grid;place-items:center;font-weight:800;font-size:20px;letter-spacing:-1px;
    box-shadow:0 4px 14px rgba(200,162,60,.35);
  }
  .brand h1{margin:0;font-size:20px;font-weight:700;letter-spacing:-.3px}
  .brand .repo{font-size:12.5px;color:#A9C2DA}
  .brand .repo a{color:#A9C2DA;text-decoration:none;border-bottom:1px dotted #5b7c9a}
  .meterrow{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .meter{flex:1;min-width:240px}
  .meter .bar{height:9px;background:rgba(255,255,255,.16);border-radius:99px;overflow:hidden}
  .meter .bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:99px;transition:width .5s ease}
  .meter .lbl{font-size:12.5px;color:#C5D6E6;margin-top:7px}
  .counts{display:flex;gap:8px;flex-wrap:wrap}
  .pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:99px;padding:5px 12px;font-size:12.5px;font-weight:600}
  .pill b{color:var(--gold)}

  /* TOOLBAR */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:20px 0 16px}
  .search{flex:1;min-width:200px;position:relative}
  .search input{
    width:100%;padding:11px 14px 11px 38px;border:1px solid var(--line);border-radius:11px;
    font-size:14px;background:#fff;outline:none;color:var(--ink);
  }
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4}
  .search input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(31,138,120,.12)}
  .btn{
    border:none;border-radius:11px;padding:11px 17px;font-size:14px;font-weight:650;
    cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
  }
  .btn-primary{background:var(--navy);color:#fff}
  .btn-primary:hover{background:var(--navy-2)}
  .btn-ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--navy)}

  /* CATEGORY FILTER */
  .cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .cat-chip{
    border:1px solid var(--line);background:#fff;border-radius:99px;padding:7px 14px;
    font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:7px;
  }
  .cat-chip .dot{width:9px;height:9px;border-radius:50%}
  .cat-chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .cat-chip .n{font-size:11.5px;opacity:.7}

  /* BOARD */
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:860px){.board{grid-template-columns:1fr}}
  .col{background:rgba(255,255,255,.55);border:1px solid var(--line);border-radius:16px;padding:14px;min-height:120px}
  .col.drop{border-color:var(--teal);background:rgba(31,138,120,.06)}
  .col-head{display:flex;align-items:center;gap:9px;margin-bottom:13px;padding:0 3px}
  .col-head .tag{width:10px;height:10px;border-radius:3px}
  .col-head h2{margin:0;font-size:14px;font-weight:700;flex:1}
  .col-head .cnt{font-size:12px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:99px;padding:2px 9px}

  /* CARD */
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;
    margin-bottom:11px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s;
    border-left:4px solid var(--slate);
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(14,40,65,.13)}
  .card.dragging{opacity:.5}
  .card . chead,.card .chead{display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:8px}
  .card h3{margin:0;font-size:14px;font-weight:650;line-height:1.35}
  .card .desc{font-size:12.5px;color:var(--muted);margin:6px 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .foot{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .badge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
  .b-cat{color:#fff}
  .b-alta{background:#FBE3E3;color:var(--red)}
  .b-media{background:#FBF0DA;color:var(--amber)}
  .b-baixa{background:#EEF2F6;color:var(--slate)}
  .b-type{background:#fff;border:1px solid var(--line);color:var(--muted)}
  .card .notes-i{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-left:auto}

  .empty{text-align:center;color:var(--muted);font-size:12.5px;padding:18px 8px;border:1.5px dashed var(--line);border-radius:12px}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(14,40,65,.5);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:34px 16px;z-index:50;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:18px;width:100%;max-width:560px;box-shadow:0 24px 60px rgba(14,40,65,.3);animation:pop .18s ease}
  @keyframes pop{from{transform:translateY(12px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line)}
  .modal-head h2{margin:0;font-size:16px}
  .x{border:none;background:#F1F5F9;width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:17px;color:var(--muted)}
  .x:hover{background:#E2E8F0}
  .modal-body{padding:20px}
  label{display:block;font-size:12.5px;font-weight:650;margin:0 0 6px;color:var(--navy)}
  input[type=text],textarea,select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;
    font-family:inherit;color:var(--ink);outline:none;background:#fff;
  }
  textarea{resize:vertical;min-height:64px}
  input:focus,textarea:focus,select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(31,138,120,.12)}
  .field{margin-bottom:15px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:480px){.grid2{grid-template-columns:1fr}}
  .modal-foot{display:flex;gap:10px;justify-content:space-between;align-items:center;padding:16px 20px;border-top:1px solid var(--line)}

  /* DETAIL */
  .detail-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .detail-desc{font-size:14px;color:var(--ink);background:#F7F9FC;border-radius:11px;padding:12px 14px;margin-bottom:18px;white-space:pre-wrap}
  .progress-h{font-size:13px;font-weight:700;margin:0 0 11px;display:flex;align-items:center;gap:7px}
  .log{list-style:none;margin:0 0 14px;padding:0;max-height:230px;overflow:auto}
  .log li{position:relative;padding:0 0 14px 22px;border-left:2px solid var(--line)}
  .log li:last-child{border-left-color:transparent}
  .log li::before{content:"";position:absolute;left:-6px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--teal);border:2px solid #fff;box-shadow:0 0 0 1px var(--teal)}
  .log .when{font-size:11px;color:var(--muted);font-weight:600}
  .log .what{font-size:13px;margin-top:2px;white-space:pre-wrap}
  .addnote{display:flex;gap:8px;align-items:flex-end}
  .addnote textarea{min-height:40px}
  .status-row{display:flex;gap:7px;margin-bottom:6px}
  .st-btn{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px;font-size:12px;font-weight:650;cursor:pointer;color:var(--muted)}
  .st-btn.on{color:#fff;border-color:transparent}
  .danger{background:none;border:none;color:var(--red);font-size:13px;font-weight:600;cursor:pointer}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:11px 20px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow);opacity:0;transition:.25s;z-index:99;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .loading{text-align:center;padding:60px;color:var(--muted)}
  .swatches{display:flex;gap:9px;flex-wrap:wrap}
  .swatch{width:30px;height:30px;border-radius:9px;cursor:pointer;border:3px solid transparent;transition:transform .1s}
  .swatch:hover{transform:scale(1.1)}
  .swatch.sel{border-color:var(--navy);box-shadow:0 0 0 2px #fff inset}
  .att-hint{font-size:11px;color:var(--muted);margin-left:9px}
  .att-list{list-style:none;margin:10px 0 0;padding:0;display:flex;flex-direction:column;gap:7px}
  .att{display:flex;align-items:center;gap:9px;background:#F7F9FC;border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .att-ic{font-size:16px;flex-shrink:0}
  .att-name{flex:1;min-width:0;font-size:13px;font-weight:600;color:var(--navy);text-align:left;border:none;background:none;padding:0;font-family:inherit;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  button.att-name{cursor:pointer}
  button.att-name:hover{text-decoration:underline}
  .att-size{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
  .att-x{border:none;background:none;color:var(--muted);cursor:pointer;font-size:17px;line-height:1;padding:0 2px;flex-shrink:0}
  .att-x:hover{color:var(--red)}
  .ind{margin-left:auto;display:flex;gap:9px;font-size:11px;color:var(--muted);font-weight:600}
</style>

<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo">C</div>
      <div>
        <h1>Check · Gerenciador de Tarefas</h1>
        <div class="repo">📦 <a href="https://github.com/rafablauth1/Check" target="_blank" rel="noopener">rafablauth1/Check</a></div>
      </div>
    </div>
    <div class="meterrow">
      <div class="meter">
        <div class="bar"><span id="progbar" style="width:0%"></span></div>
        <div class="lbl" id="proglbl">Carregando…</div>
      </div>
      <div class="counts" id="counts"></div>
    </div>
  </header>

  <div class="toolbar">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
      <input id="search" type="text" placeholder="Buscar demanda…">
    </div>
    <button class="btn btn-ghost" id="btnExport">↧ Exportar</button>
    <button class="btn btn-primary" id="btnNew">+ Nova demanda</button>
  </div>

  <div class="cats" id="cats"></div>

  <div id="content"><div class="loading">Carregando suas demandas…</div></div>
</div>

<!-- NEW / EDIT MODAL -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="modal-head"><h2 id="formTitle">Nova demanda</h2><button class="x" data-close>×</button></div>
    <div class="modal-body">
      <div class="field"><label>Título</label><input type="text" id="fTitle" placeholder="Ex: Salvar tipo de equipamento nos subgrupos"></div>
      <div class="field"><label>Descrição / detalhes</label><textarea id="fDesc" placeholder="O que precisa ser feito, contexto, como reproduzir o bug…"></textarea></div>
      <div class="grid2">
        <div class="field"><label>Categoria</label><select id="fCat"></select></div>
        <div class="field"><label>Tipo</label><select id="fType">
          <option value="feature">Funcionalidade</option>
          <option value="bug">Bug</option>
          <option value="improvement">Melhoria</option>
        </select></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Prioridade</label><select id="fPrio">
          <option value="alta">Alta</option>
          <option value="media" selected>Média</option>
          <option value="baixa">Baixa</option>
        </select></div>
        <div class="field"><label>Status</label><select id="fStatus">
          <option value="todo">A fazer</option>
          <option value="doing">Em andamento</option>
          <option value="done">Concluído</option>
        </select></div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Anexos de exemplo</label>
        <input type="file" id="fFileInput" accept=".pdf,.xls,.xlsx,.csv,image/*" multiple hidden>
        <button type="button" class="btn btn-ghost" id="fAttachBtn">📎 Anexar PDF / Excel / imagem</button>
        <span class="att-hint">máx. ~3 MB por arquivo</span>
        <ul class="att-list" id="fAttachList"></ul>
      </div>
    </div>
    <div class="modal-foot">
      <span></span>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" data-close>Cancelar</button>
        <button class="btn btn-primary" id="fSave">Salvar demanda</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay">
  <div class="modal">
    <div class="modal-head"><h2 id="dTitle">Detalhe</h2><button class="x" data-close>×</button></div>
    <div class="modal-body">
      <div class="detail-meta" id="dMeta"></div>
      <div class="detail-desc" id="dDesc"></div>

      <label>Status</label>
      <div class="status-row" id="dStatusRow">
        <button class="st-btn" data-st="todo">A fazer</button>
        <button class="st-btn" data-st="doing">Em andamento</button>
        <button class="st-btn" data-st="done">Concluído</button>
      </div>

      <p class="progress-h" style="margin-top:20px">📎 Anexos</p>
      <ul class="att-list" id="dAttList"></ul>
      <input type="file" id="dFileInput" accept=".pdf,.xls,.xlsx,.csv,image/*" multiple hidden>
      <button type="button" class="btn btn-ghost" id="dAttachBtn" style="margin-top:10px">📎 Anexar arquivo</button>

      <p class="progress-h" style="margin-top:20px">📝 Progresso & anotações</p>
      <ul class="log" id="dLog"></ul>
      <div class="addnote">
        <div style="flex:1"><textarea id="dNote" placeholder="Registrar avanço, decisão, observação…"></textarea></div>
        <button class="btn btn-primary" id="dAddNote">Anotar</button>
      </div>
    </div>
    <div class="modal-foot">
      <button class="danger" id="dDelete">🗑 Excluir demanda</button>
      <button class="btn btn-ghost" id="dEdit">Editar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- CATEGORY MODAL -->
<div class="overlay" id="catOverlay">
  <div class="modal" style="max-width:440px">
    <div class="modal-head"><h2>Nova área de demanda</h2><button class="x" data-close>×</button></div>
    <div class="modal-body">
      <div class="field"><label>Nome da área</label><input type="text" id="cName" placeholder="Ex: Relatórios, Dashboard, OCR…"></div>
      <div class="field"><label>Cor da etiqueta</label><div class="swatches" id="cSwatches"></div></div>
    </div>
    <div class="modal-foot">
      <span></span>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" data-close>Cancelar</button>
        <button class="btn btn-primary" id="cSave">Criar área</button>
      </div>
    </div>
  </div>
</div>

<script>
// --- storage bridge: ferramenta interna/temporária usa localStorage ---
if(!window.storage){
  window.storage = {
    async get(k){ const v=localStorage.getItem(k); return v===null?null:{value:v}; },
    async set(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ console.error("storage cheio?",e); return null; } },
    async delete(k){ localStorage.removeItem(k); return true; },
  };
}
const KEY = "check_tasks_v1";
const CATS_KEY = "check_cats_v1";
const DEFAULT_CATS = {
  "Instruções de Trabalho": "#3B6FB5",
  "Certificados":           "#1F8A78",
  "Grupos":                 "#C8A23C",
  "Equipamentos":           "#7B5EA7",
  "Bugs":                   "#D14343",
  "Geral":                  "#64748B"
};
let CATS = {...DEFAULT_CATS};
const SWATCHES = ["#3B6FB5","#1F8A78","#C8A23C","#7B5EA7","#D14343","#0E2841","#E07B39","#2A9D8F","#8E44AD","#16A085","#C0392B","#64748B"];
const STATUS = {todo:{l:"A fazer",c:"#64748B"},doing:{l:"Em andamento",c:"#C8A23C"},done:{l:"Concluído",c:"#1F8A78"}};
const PRIO = {alta:"Alta",media:"Média",baixa:"Baixa"};
const TYPE = {feature:"Func.",bug:"Bug",improvement:"Melhoria"};

let tasks = [];
let filterCat = "all";
let searchTerm = "";
let editingId = null;
let openId = null;

const $ = s => document.querySelector(s);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const now = () => new Date().toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});

const SEED = [
  {cat:"Instruções de Trabalho",type:"feature",prio:"media",status:"todo",title:"Confirmação ao sair sem salvar",desc:"Não deixar voltar sem salvar. Mostrar diálogo: \"Deseja retornar sem salvar os dados?\"."},
  {cat:"Instruções de Trabalho",type:"feature",prio:"baixa",status:"todo",title:"Corretor ortográfico com sugestões",desc:"Colocar corretor estilo Word, com sugestão de correção nos campos de texto."},
  {cat:"Instruções de Trabalho",type:"feature",prio:"alta",status:"todo",title:"Editor de diagramas estilo \"Paint\"",desc:"Na área de Maker de IT, criar um editor de diagramas de conexão simples: formas geométricas, fios e ligações pra simular equipamentos e montar esquemas."},
  {cat:"Instruções de Trabalho",type:"feature",prio:"media",status:"todo",title:"Glossário de siglas e definições",desc:"Digita a sigla → se já existe, puxa automaticamente; se não existe, cadastra no glossário (siglas + definições)."},
  {cat:"Certificados",type:"improvement",prio:"media",status:"todo",title:"Melhorar leitura OCR do certificado",desc:"A leitura OCR do certificado precisa ser melhor trabalhada (precisão / extração)."},
  {cat:"Grupos",type:"bug",prio:"alta",status:"todo",title:"Não salva tipo de equipamento nos subgrupos",desc:"Ao criar um tipo de equipamento dentro dos subgrupos, não está salvando."},
  {cat:"Equipamentos",type:"feature",prio:"media",status:"todo",title:"Calibrar antes do uso (certificado vencido +4 anos)",desc:"No cadastro, se o certificado estiver vencido há mais de 4 anos, marcar para calibrar antes do uso. Considerar a periodicidade da análise crítica."},
  {cat:"Equipamentos",type:"feature",prio:"media",status:"todo",title:"Filtros dependentes com recálculo de contadores",desc:"No filtro de equipamento, ao selecionar uma sigla, recalcular os contadores dos outros grupos consequentes do filtro. Um filtro depende do outro (encadeados)."},
  {cat:"Bugs",type:"bug",prio:"alta",status:"todo",title:"Travamento de digitação após excluir",desc:"Depois de apagar algo (ex: deletar um procedimento) fica ~30s sem conseguir digitar."}
];

// ---------- storage ----------
async function loadCats(){
  try{
    const r = await window.storage.get(CATS_KEY);
    if(r && r.value){ CATS = JSON.parse(r.value); return; }
  }catch(e){ /* sem registro ainda */ }
  CATS = {...DEFAULT_CATS};
  await saveCats(true);
}
async function saveCats(silent){
  try{
    const res = await window.storage.set(CATS_KEY, JSON.stringify(CATS));
    if(!res) console.error("Falha ao salvar áreas");
  }catch(e){ console.error("Erro storage áreas:",e); }
}
async function load(){
  try{
    const r = await window.storage.get(KEY);
    if(r && r.value){ tasks = JSON.parse(r.value); return; }
  }catch(e){ /* sem registro ainda */ }
  // seed first run
  tasks = SEED.map((t,i)=>({id:uid(),created:now(),log:[{when:now(),what:"Demanda registrada (lista de 22/06/2026)."}],...t}));
  await save(true);
}
async function save(silent){
  try{
    const res = await window.storage.set(KEY, JSON.stringify(tasks));
    if(!res) console.error("Falha ao salvar");
    else if(!silent) toast("Salvo ✓");
  }catch(e){ console.error("Erro de storage:",e); toast("Erro ao salvar"); }
}

// ---------- render ----------
function render(){
  // counts + progress
  const total = tasks.length, done = tasks.filter(t=>t.status==="done").length;
  const doing = tasks.filter(t=>t.status==="doing").length;
  const todo = total-done-doing;
  const pct = total? Math.round(done/total*100):0;
  $("#progbar").style.width = pct+"%";
  $("#proglbl").textContent = `${done} de ${total} concluídas · ${pct}% do projeto`;
  $("#counts").innerHTML =
    `<span class="pill"><b>${todo}</b> a fazer</span>`+
    `<span class="pill"><b>${doing}</b> em andamento</span>`+
    `<span class="pill"><b>${done}</b> concluídas</span>`;

  // category chips
  const catCounts = {};
  tasks.forEach(t=>catCounts[t.cat]=(catCounts[t.cat]||0)+1);
  let chips = `<div class="cat-chip ${filterCat==='all'?'active':''}" data-cat="all">Todas <span class="n">${total}</span></div>`;
  Object.keys(CATS).forEach(c=>{
    const n = catCounts[c]||0;
    chips += `<div class="cat-chip ${filterCat===c?'active':''}" data-cat="${c}"><span class="dot" style="background:${CATS[c]}"></span>${c} <span class="n">${n}</span></div>`;
  });
  chips += `<div class="cat-chip" id="addCatChip" style="border-style:dashed;color:var(--navy);font-weight:700">+ Nova área</div>`;
  $("#cats").innerHTML = chips;
  $("#cats").querySelectorAll(".cat-chip[data-cat]").forEach(el=>el.onclick=()=>{filterCat=el.dataset.cat;render();});
  const addChip=$("#addCatChip"); if(addChip) addChip.onclick=openCatModal;

  // board
  const cols = [["todo","A fazer"],["doing","Em andamento"],["done","Concluído"]];
  let html = '<div class="board">';
  cols.forEach(([st,label])=>{
    const items = tasks.filter(t=>matches(t)&&t.status===st);
    html += `<div class="col" data-col="${st}">
      <div class="col-head"><span class="tag" style="background:${STATUS[st].c}"></span><h2>${label}</h2><span class="cnt">${items.length}</span></div>`;
    if(!items.length) html += `<div class="empty">Nada aqui ainda</div>`;
    items.forEach(t=>html += cardHTML(t));
    html += `</div>`;
  });
  html += '</div>';
  $("#content").innerHTML = html;

  // card events + drag
  document.querySelectorAll(".card").forEach(c=>{
    c.onclick = ()=>openDetail(c.dataset.id);
    c.ondragstart = e=>{e.dataTransfer.setData("id",c.dataset.id);c.classList.add("dragging");};
    c.ondragend = ()=>c.classList.remove("dragging");
  });
  document.querySelectorAll(".col").forEach(col=>{
    col.ondragover = e=>{e.preventDefault();col.classList.add("drop");};
    col.ondragleave = ()=>col.classList.remove("drop");
    col.ondrop = e=>{
      e.preventDefault();col.classList.remove("drop");
      const id=e.dataTransfer.getData("id");
      const t=tasks.find(x=>x.id===id);
      if(t && t.status!==col.dataset.col){
        t.status=col.dataset.col;
        t.log.unshift({when:now(),what:`Status → ${STATUS[t.status].l}.`});
        save();render();
      }
    };
  });
}

function matches(t){
  if(filterCat!=="all" && t.cat!==filterCat) return false;
  if(searchTerm){
    const s=searchTerm.toLowerCase();
    return (t.title+" "+t.desc+" "+t.cat).toLowerCase().includes(s);
  }
  return true;
}

function cardHTML(t){
  const noteN = t.log? t.log.length:0;
  const fileN = (t.files||[]).length;
  return `<div class="card" draggable="true" data-id="${t.id}" style="border-left-color:${CATS[t.cat]||'#64748B'}">
    <div class="chead"><h3>${esc(t.title)}</h3></div>
    ${t.desc?`<div class="desc">${esc(t.desc)}</div>`:""}
    <div class="foot">
      <span class="badge b-cat" style="background:${CATS[t.cat]||'#64748B'}">${esc(t.cat)}</span>
      <span class="badge b-type">${TYPE[t.type]||t.type}</span>
      <span class="badge b-${t.prio}">${PRIO[t.prio]}</span>
      <span class="ind">${noteN>1?`<span>📝 ${noteN-1}</span>`:""}${fileN?`<span>📎 ${fileN}</span>`:""}</span>
    </div>
  </div>`;
}
function esc(s){return (s||"").replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

// ---------- category modal ----------
let pickedColor = SWATCHES[0];
function openCatModal(){
  $("#cName").value="";
  pickedColor = SWATCHES.find(c=>!Object.values(CATS).includes(c)) || SWATCHES[0];
  renderSwatches();
  show("#catOverlay");setTimeout(()=>$("#cName").focus(),50);
}
function renderSwatches(){

    `<div class="swatch ${c===pickedColor?'sel':''}" data-c="${c}" style="background:${c}"></div>`).join("");
  $("#cSwatches").querySelectorAll(".swatch").forEach(s=>s.onclick=()=>{pickedColor=s.dataset.c;renderSwatches();});

$("#cSave").onclick = async ()=>{
  const name=$("#cName").value.trim();
  if(!name){toast("Dá um nome pra área");$("#cName").focus();return;}
  if(CATS[name]){toast("Já existe uma área com esse nome");return;}
  CATS[name]=pickedColor;
  await saveCats();
  hide("#catOverlay");
  filterCat=name;
  render();
  toast("Área criada ✓");

$("#cName").addEventListener("keydown",e=>{if(e.key==="Enter")$("#cSave").click();});

// ---------- attachments ----------
const MAX_FILE = 4*1024*1024;   // 4 MB por arquivo
const CHUNK = 700*1024;         // grava em pedaços de 700 KB (limite do storage)
let formFiles = [];     // {fid,name,type,size,dataURL?,chunks?,isNew}
let removedFiles = [];  // {fid,chunks} removidos durante edição

function fmtSize(b){return b<1024?b+" B":b<1048576?Math.round(b/1024)+" KB":(b/1048576).toFixed(1)+" MB";}
function fileIcon(name,type){
  const n=(name||"").toLowerCase(); type=type||"";
  if(n.endsWith(".pdf")||type.includes("pdf")) return "📕";
  if(/\.(xls|xlsx|csv)$/.test(n)||type.includes("sheet")||type.includes("excel")||type.includes("csv")) return "📊";
  if(type.startsWith("image/")) return "🖼️";
  return "📎";
}
function readFileMeta(file){
  return new Promise(res=>{
    if(file.size>MAX_FILE){toast(`"${file.name}" passou de 4 MB`);res(null);return;}
    const r=new FileReader();
    r.onload=()=>res({fid:uid(),name:file.name,type:file.type,size:file.size,dataURL:r.result});
    r.onerror=()=>{toast("Erro ao ler "+file.name);res(null);};
    r.readAsDataURL(file);
  });
}
// grava o dataURL em N pedaços; retorna a quantidade de pedaços (lança erro se falhar)
async function putFile(fid,dataURL){
  const n=Math.ceil(dataURL.length/CHUNK);
  for(let i=0;i<n;i++){
    const part=dataURL.slice(i*CHUNK,(i+1)*CHUNK);
    const res=await window.storage.set(`check_file_${fid}_${i}`,part);
    if(res===null) throw new Error("storage retornou null");
  }
  return n;
}
async function getFile(fid,chunks){
  let s="";
  for(let i=0;i<(chunks||1);i++){
    const r=await window.storage.get(`check_file_${fid}_${i}`);
    if(!r||r.value==null) throw new Error("pedaço faltando");
    s+=r.value;
  }
  return s;
}
async function delFile(fid,chunks){
  for(let i=0;i<(chunks||1);i++){ try{await window.storage.delete(`check_file_${fid}_${i}`);}catch(e){} }
}
async function downloadFile(file){
  try{
    const data=await getFile(file.fid,file.chunks);
    const a=document.createElement("a");a.href=data;a.download=file.name;a.click();
  }catch(e){toast("Erro ao abrir arquivo");}
}

// form attachments (pendentes até salvar)
function renderFormAttach(){
  const ul=$("#fAttachList");
  ul.innerHTML = formFiles.map(f=>
    `<li class="att"><span class="att-ic">${fileIcon(f.name,f.type)}</span>`+
    `<span class="att-name">${esc(f.name)}</span>`+
    `<span class="att-size">${fmtSize(f.size)}</span>`+
    `<button class="att-x" data-rm="${f.fid}" title="Remover">×</button></li>`).join("");
  ul.querySelectorAll(".att-x").forEach(b=>b.onclick=()=>{
    const fid=b.dataset.rm, f=formFiles.find(x=>x.fid===fid);
    if(f && !f.isNew) removedFiles.push({fid:f.fid,chunks:f.chunks});
    formFiles=formFiles.filter(x=>x.fid!==fid);
    renderFormAttach();
  });
}
$("#fAttachBtn").onclick=()=>$("#fFileInput").click();
$("#fFileInput").onchange=async e=>{
  for(const file of e.target.files){
    const m=await readFileMeta(file);
    if(m){m.isNew=true;formFiles.push(m);}
  }
  e.target.value="";renderFormAttach();
};
// grava os anexos novos, remove os apagados; só retorna metadados dos que gravaram OK
async function commitFormFiles(){
  for(const r of removedFiles){ await delFile(r.fid,r.chunks); }
  const out=[];
  for(const f of formFiles){
    if(f.isNew){
      try{
        const chunks=await putFile(f.fid,f.dataURL);
        out.push({fid:f.fid,name:f.name,type:f.type,size:f.size,chunks});
      }catch(err){ toast("Falha ao salvar "+f.name); }
    }else{
      out.push({fid:f.fid,name:f.name,type:f.type,size:f.size,chunks:f.chunks});
    }
  }
  return out;
}

// ---------- form modal ----------
function fillCatSelect(){
  $("#fCat").innerHTML = Object.keys(CATS).map(c=>`<option value="${c}">${c}</option>`).join("");
}
function openForm(id){
  editingId = id||null;
  fillCatSelect();
  formFiles=[]; removedFiles=[];
  if(id){
    const t=tasks.find(x=>x.id===id);
    $("#formTitle").textContent="Editar demanda";
    $("#fTitle").value=t.title;$("#fDesc").value=t.desc;$("#fCat").value=t.cat;
    $("#fType").value=t.type;$("#fPrio").value=t.prio;$("#fStatus").value=t.status;
    formFiles=(t.files||[]).map(f=>({...f,isNew:false}));
  }else{
    $("#formTitle").textContent="Nova demanda";
    $("#fTitle").value="";$("#fDesc").value="";$("#fCat").value=filterCat!=="all"?filterCat:"Geral";
    $("#fType").value="feature";$("#fPrio").value="media";$("#fStatus").value="todo";
  }
  renderFormAttach();
  show("#formOverlay");setTimeout(()=>$("#fTitle").focus(),50);
}
$("#fSave").onclick = async ()=>{
  const title=$("#fTitle").value.trim();
  if(!title){toast("Dá um título pra demanda");$("#fTitle").focus();return;}
  const data={title,desc:$("#fDesc").value.trim(),cat:$("#fCat").value,type:$("#fType").value,prio:$("#fPrio").value,status:$("#fStatus").value};
  const files = await commitFormFiles();
  if(editingId){
    const t=tasks.find(x=>x.id===editingId);
    const changed=t.status!==data.status;
    Object.assign(t,data);
    t.files=files;
    t.log.unshift({when:now(),what:"Demanda editada."});
    if(changed) t.log.unshift({when:now(),what:`Status → ${STATUS[data.status].l}.`});
  }else{
    tasks.unshift({id:uid(),created:now(),log:[{when:now(),what:files.length?`Demanda criada com ${files.length} anexo(s).`:"Demanda criada."}],files,...data});
  }
  await save();hide("#formOverlay");render();toast("Demanda salva ✓");
};

// ---------- detail modal ----------
function openDetail(id){
  openId=id;
  const t=tasks.find(x=>x.id===id);if(!t)return;
  $("#dTitle").textContent=t.title;
  $("#dMeta").innerHTML =
    `<span class="badge b-cat" style="background:${CATS[t.cat]||'#64748B'}">${esc(t.cat)}</span>`+
    `<span class="badge b-type">${TYPE[t.type]||t.type}</span>`+
    `<span class="badge b-${t.prio}">${PRIO[t.prio]} prioridade</span>`;
  $("#dDesc").textContent=t.desc||"Sem descrição.";
  document.querySelectorAll("#dStatusRow .st-btn").forEach(b=>{
    const on=b.dataset.st===t.status;
    b.classList.toggle("on",on);
    b.style.background=on?STATUS[t.status].c:"#fff";
  });
  renderLog(t);
  renderDetailAttach(t);
  $("#dNote").value="";
  show("#detailOverlay");
}
function renderLog(t){
  $("#dLog").innerHTML = (t.log||[]).map(l=>
    `<li><div class="when">${l.when}</div><div class="what">${esc(l.what)}</div></li>`).join("")
    || `<li class="empty" style="border:none">Sem anotações ainda.</li>`;
}
function renderDetailAttach(t){
  const files=t.files||[];
  const ul=$("#dAttList");
  ul.innerHTML = files.length ? files.map(f=>
    `<li class="att"><span class="att-ic">${fileIcon(f.name,f.type)}</span>`+
    `<button class="att-name" data-dl="${f.fid}" data-nm="${esc(f.name)}" title="Baixar">${esc(f.name)}</button>`+
    `<span class="att-size">${fmtSize(f.size)}</span>`+
    `<button class="att-x" data-rmd="${f.fid}" title="Remover">×</button></li>`).join("")
    : `<li class="empty" style="border:none;padding:4px 0">Nenhum anexo. Use o botão abaixo pra incluir um exemplo.</li>`;
  ul.querySelectorAll("[data-dl]").forEach(b=>b.onclick=()=>{
    const f=(t.files||[]).find(x=>x.fid===b.dataset.dl);
    if(f) downloadFile(f);
  });
  ul.querySelectorAll("[data-rmd]").forEach(b=>b.onclick=async ()=>{
    if(!confirm("Remover este anexo?"))return;
    const fid=b.dataset.rmd;
    const tk=tasks.find(x=>x.id===openId);
    const f=(tk.files||[]).find(x=>x.fid===fid);
    if(f) await delFile(f.fid,f.chunks);
    tk.files=(tk.files||[]).filter(x=>x.fid!==fid);
    tk.log.unshift({when:now(),what:"Removeu um anexo."});
    await save();openDetail(openId);render();
  });
}
$("#dAttachBtn").onclick=()=>$("#dFileInput").click();
$("#dFileInput").onchange=async e=>{
  const tk=tasks.find(x=>x.id===openId);if(!tk)return;
  tk.files=tk.files||[];
  let ok=0;
  for(const file of e.target.files){
    const m=await readFileMeta(file);
    if(!m) continue;
    try{
      const chunks=await putFile(m.fid,m.dataURL);
      tk.files.push({fid:m.fid,name:m.name,type:m.type,size:m.size,chunks});
      tk.log.unshift({when:now(),what:`Anexou: ${m.name}`});
      ok++;
    }catch(err){ toast("Falha ao salvar "+m.name); }
  }
  e.target.value="";
  await save();openDetail(openId);render();
  if(ok) toast(ok>1?`${ok} anexos salvos ✓`:"Anexo salvo ✓");
};
document.querySelectorAll("#dStatusRow .st-btn").forEach(b=>{
  b.onclick=async ()=>{
    const t=tasks.find(x=>x.id===openId);if(!t)return;
    if(t.status===b.dataset.st)return;
    t.status=b.dataset.st;
    t.log.unshift({when:now(),what:`Status → ${STATUS[t.status].l}.`});
    await save();openDetail(openId);render();
  };
});
$("#dAddNote").onclick = async ()=>{
  const v=$("#dNote").value.trim();if(!v)return;
  const t=tasks.find(x=>x.id===openId);
  t.log.unshift({when:now(),what:v});
  await save();$("#dNote").value="";renderLog(t);render();toast("Anotado ✓");
};
$("#dEdit").onclick = ()=>{hide("#detailOverlay");openForm(openId);};
$("#dDelete").onclick = async ()=>{
  if(!confirm("Excluir esta demanda? Não dá pra desfazer.")) return;
  const t=tasks.find(x=>x.id===openId);
  if(t && t.files) for(const f of t.files){ await delFile(f.fid,f.chunks); }
  tasks=tasks.filter(x=>x.id!==openId);
  await save();hide("#detailOverlay");render();toast("Demanda excluída");
};

// ---------- export ----------
function buildMarkdown(){
  let md=`# Check — Demandas\nrafablauth1/Check · gerado ${now()}\n\n`;
  Object.keys(CATS).forEach(c=>{
    const its=tasks.filter(t=>t.cat===c);if(!its.length)return;
    md+=`## ${c}\n`;
    its.forEach(t=>{
      const mark=t.status==="done"?"x":" ";
      md+=`- [${mark}] **${t.title}** _(${PRIO[t.prio]} · ${TYPE[t.type]||t.type} · ${STATUS[t.status].l})_\n`;
      if(t.desc) md+=`  - ${t.desc.replace(/\n/g," ")}\n`;
    });
    md+="\n";
  });
  return md;
}
$("#btnExport").onclick = async ()=>{
  const md=buildMarkdown();
  // 1) grava DEMANDAS.md na raiz do projeto (pra eu/Claude ler e implementar)
  let gravou=false;
  try{
    const r=await fetch("/api/check-export",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({markdown:md})});
    gravou=r.ok;
  }catch(e){ /* fora do app: só baixa */ }
  // 2) baixa uma cópia também
  const blob=new Blob([md],{type:"text/markdown"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="check-demandas.md";a.click();
  toast(gravou?"DEMANDAS.md gravado na raiz ✓":"Markdown baixado ✓");
};

// ---------- helpers ----------
function show(s){$(s).classList.add("show");}
function hide(s){$(s).classList.remove("show");}
let toastT;
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1900);}

$("#btnNew").onclick=()=>openForm();
$("#search").oninput=e=>{searchTerm=e.target.value;render();};
document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>{b.closest(".overlay").classList.remove("show");});
document.querySelectorAll(".overlay").forEach(o=>o.onclick=e=>{if(e.target===o)o.classList.remove("show");});
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.querySelectorAll(".overlay.show").forEach(o=>o.classList.remove("show"));});

(async()=>{ await loadCats(); await load(); render(); })();
</script>
